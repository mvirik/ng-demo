name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Finny/package-lock.json

      - name: Install dependencies
        working-directory: Finny
        run: npm ci

      - name: Run unit tests
        working-directory: Finny
        run: npm test -- --watch=false
